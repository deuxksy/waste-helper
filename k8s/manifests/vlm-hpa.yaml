apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vlm-hpa
  namespace: waste-helper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vlm-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Pods
    pods:
      metric:
        name: vlm_request_queue_depth
      target:
        type: AverageValue
        averageValue: "5"
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
