# k8s/manifests/prometheus-config.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: waste-helper
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
    - job_name: 'api-server'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - waste-helper
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: api-server
        action: keep

    - job_name: 'vlm-service'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - waste-helper
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: vlm-service
        action: keep
