apiVersion: apps/v1
kind: Deployment
metadata:
  name: vlm-service
  namespace: waste-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlm-service
  template:
    metadata:
      labels:
        app: vlm-service
    spec:
      containers:
      - name: vlm-service
        image: vlm-service:latest
        ports:
        - containerPort: 50051
          name: grpc
        - containerPort: 8000
          name: http
        resources:
          requests:
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
        env:
        - name: MODEL_NAME
          value: "Qwen/Qwen3-VL-4B"
        - name: VLLM_MAX_MODEL_LEN
          value: "4096"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: vlm-service
  namespace: waste-helper
spec:
  selector:
    app: vlm-service
  ports:
  - port: 50051
    name: grpc
  - port: 8000
    name: http
