apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vlm-service-policy
  namespace: waste-helper
spec:
  podSelector:
    matchLabels:
      app: vlm-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-server
    ports:
    - protocol: TCP
      port: 50051
