apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: waste-helper
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ""  # Git 저장소 URL
    targetRevision: HEAD
    path: k8s/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: waste-helper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
