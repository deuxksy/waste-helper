# Default values for waste-helper

apiServer:
  replicaCount: 2
  image:
    repository: waste-helper/api-server
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

vlmService:
  replicaCount: 1
  image:
    repository: waste-helper/vlm-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 50051
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "2"
      memory: 8Gi
      nvidia.com/gpu: "1"

postgresql:
  enabled: true
  auth:
    database: waste_helper
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  auth:
    enabled: true
  master:
    persistence:
      size: 2Gi
