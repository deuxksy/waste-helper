name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # API Server — Java 21 + Gradle
  # =============================================================================
  api-test:
    name: API Server Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-server
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api-server/build/reports/tests/
          retention-days: 7

  api-build:
    name: API Server Build
    runs-on: ubuntu-latest
    needs: api-test
    defaults:
      run:
        working-directory: api-server
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build JAR
        run: ./gradlew bootJar -x test

  # =============================================================================
  # Frontend — Node.js + Expo
  # =============================================================================
  frontend-check:
    name: Frontend Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Expo dependency check
        run: npx expo-doctor

      - name: Web build test
        run: npx expo export --platform web --output-dir /tmp/expo-export

  # =============================================================================
  # Docker Build — 이미지 빌드 검증
  # =============================================================================
  docker-build:
    name: Docker Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api-server
            context: api-server
            dockerfile: api-server/Dockerfile.local
          - target: mock-vlm
            context: mock-vlm
            dockerfile: mock-vlm/Dockerfile
          - target: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # API Server는 bootJar 선행 필요
      - name: Build API Server JAR
        if: matrix.target == 'api-server'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run bootJar
        if: matrix.target == 'api-server'
        run: cd api-server && ./gradlew bootJar -x test

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # K8s Manifest 검증
  # =============================================================================
  k8s-validate:
    name: K8s Manifest Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: kubeconform -summary -output json k8s/manifests/*.yaml
        continue-on-error: true

      - name: Validate local manifests
        run: kubeconform -summary -output json k8s/manifests/local/*.yaml
        continue-on-error: true
